name: Build Towjo APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Extract project
        run: |
          unzip tow_truck_management_app_build_ready.zip
          ls -la tow_truck_management_app

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: tow_truck_management_app
        run: flutter pub get

      - name: Build debug APK
        working-directory: tow_truck_management_app
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Towjo-debug-apk
          path: tow_truck_management_app/build/app/outputs/flutter-apk/app-debug.apk
